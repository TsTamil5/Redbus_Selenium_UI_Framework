ror message \"Source and Destination city cannot be same\" should be displayed\r\n\r\n    Examples: \r\n      | city      |\r\n      | Koyambedu |\r\n\r\n  @SeatSelection\r\n  Scenario: Select bus and seat\r\n    Given User searches buses\r\n    When User selects FlixBus and route\r\n    And User selects an available seat\r\n    And User clicks on proceed button\r\n    Then User should move to boarding and dropping page\r\n\r\n  @BoardandDrop\r\n  Scenario: Select boarding and dropping points\r\n    Given User has selected seat\r\n    When User selects boarding point\r\n    And User selects dropping point\r\n    And User clicks on continue\r\n    Then User should move to passenger details page\r\n\r\n  @Payment\r\n  Scenario Outline: Enter passenger details and proceed to payment\r\n    Given User is on passenger details page\r\n    When User enters basic passenger details\r\n      | phone      | email          | state      |\r\n      | 9876543210 | test@gmail.com | Tamil Nadu |\r\n    And User enters personal details \"<name>\" \"<age>\" \"<gender>\"\r\n    Then User should see payment options\r\n\r\n    Examples: \r\n      | name      | age | gender |\r\n      | Test User |  25 | female |\r\n      | Demo User |  30 | male   |\r\n","mediaType":"text\/x.cucumber.gherkin+plain"}},{"gherkinDocument":{"uri":"file:\/\/\/E:\/Redbus_Selenium_UI_Framework\/.\/src\/test\/java\/com\/redbus\/testing\/featurefiles\/BusTicket.feature","feature":{"location":{"line":1,"column":1},"tags":[],"language":"en","keyword":"Feature","name":"Bus Ticket Booking End-to-End Flow","description":"","children":[{"scenario":{"location":{"line":4,"column":3},"tags":[{"location":{"line":3,"column":2},"name":"@SwapFeature","id":"4b6588fa-b385-487b-9199-a030b9366e11"}],"keyword":"Scenario","name":"Verify buses are displayed after swapping source and destination","description":"","steps":[{"location":{"line":5,"column":5},"keyword":"Given ","keywordType":"Context","text":"User is on the RedBus homepa
